server:
  port: 8081
spring:
  application:
    name: iam-service
  datasource:
    url: jdbc:mysql://localhost:3306/pharmatrack_iam_ms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
jwt:
  secret: PharmaTrackSecretKey_MinimumThirtyTwoChars!
  expiration: 1800000
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: localhost

# Default (prod): never expose the reset token.
app:
  security:
    expose-reset-token: false

---
# Dev profile: return the password-reset token in the REQUEST response so the
# forgot-password flow is testable without an email server. Activate with
# --spring.profiles.active=dev. Never enable in prod.
spring:
  config:
    activate:
      on-profile: dev
app:
  security:
    expose-reset-token: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
logging:
  level:
    root: INFO
    org.springframework: INFO
    com.cts.pharmatrack: DEBUG
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html



